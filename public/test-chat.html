<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Chat AI ASINU</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; height: 100vh; display: flex; flex-direction: column; }

.header { background: linear-gradient(135deg, #08b8a2, #069b87); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; }

.tabs { display: flex; background: #fff; border-bottom: 2px solid #e5e5e5; }
.tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; color: #666; transition: all 0.2s; }
.tab.active { color: #08b8a2; border-bottom-color: #08b8a2; }

.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
.msg.ai { background: #fff; color: #333; align-self: flex-start; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
.msg.user { background: #08b8a2; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.system { background: #fef3c7; color: #92400e; align-self: center; font-size: 12px; border-radius: 8px; text-align: center; }
.msg .meta { font-size: 11px; color: #999; margin-top: 6px; }
.msg.ai .meta { color: #aaa; }

.options { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
.opt-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid #08b8a2; background: #fff; color: #08b8a2; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.opt-btn:hover { background: #08b8a2; color: #fff; }
.opt-btn.selected { background: #08b8a2; color: #fff; }

.input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; }
.input-area input, .input-area textarea { flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; outline: none; resize: none; }
.input-area input:focus, .input-area textarea:focus { border-color: #08b8a2; }
.input-area button { padding: 10px 20px; background: #08b8a2; color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge.high { background: #fecaca; color: #dc2626; }
.badge.medium { background: #fef3c7; color: #d97706; }
.badge.low { background: #dcfce7; color: #16a34a; }

.status-bar { padding: 8px 16px; font-size: 12px; font-weight: 600; border-top: 1px solid #e0f2f1; display: flex; align-items: center; gap: 8px; }
.status-bar .dot { width: 8px; height: 8px; border-radius: 50%; }
.status-bar.monitoring { background: #f0fdf4; color: #16a34a; }
.status-bar.monitoring .dot { background: #22c55e; }
.status-bar.follow_up { background: #fffbeb; color: #d97706; }
.status-bar.follow_up .dot { background: #f59e0b; }
.status-bar.high_alert { background: #fef2f2; color: #dc2626; }
.status-bar.high_alert .dot { background: #ef4444; }
.status-bar.resolved { background: #f0f9ff; color: #2563eb; }
.status-bar.resolved .dot { background: #3b82f6; }

.checkin-buttons { padding: 12px 16px; background: #f9f9f9; border-top: 1px solid #eee; }
.checkin-buttons .label { font-size: 13px; color: #555; font-weight: 600; margin-bottom: 8px; }
.checkin-buttons .sub-label { font-size: 11px; color: #999; margin-bottom: 6px; }
.checkin-buttons .btn-row { display: flex; gap: 8px; }
.checkin-buttons .btn-row button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }

.login-screen { display: flex; flex: 1; align-items: center; justify-content: center; }
.login-box { width: 340px; padding: 32px 24px; background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
.login-box h2 { font-size: 20px; color: #333; margin-bottom: 4px; }
.login-box .sub { font-size: 13px; color: #999; margin-bottom: 20px; }
.login-box input { width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; margin-bottom: 10px; outline: none; }
.login-box input:focus { border-color: #08b8a2; }
.login-box button { width: 100%; padding: 14px; background: #08b8a2; color: #fff; border: none; border-radius: 10px; font-weight: 700; font-size: 15px; cursor: pointer; }
.login-box button:disabled { opacity: 0.5; }
.login-box .error { color: #dc2626; font-size: 12px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h2>Asinu AI</h2>
    <div class="sub">Đăng nhập để sử dụng</div>
    <input id="login-id" placeholder="Email hoặc số điện thoại">
    <input id="login-pw" type="password" placeholder="Mật khẩu">
    <button onclick="doLogin()" id="login-btn">Đăng nhập</button>
    <div id="login-error" class="error"></div>
  </div>
</div>

<!-- APP (hidden until login) -->
<div id="app-screen" style="display:none;flex:1;flex-direction:column;">

<div class="header">
  <h1>Asinu AI</h1>
  <span id="user-label" style="font-size:12px;opacity:0.8;flex:1;"></span>
  <button onclick="resetSession()" style="padding:6px 14px;border:2px solid rgba(255,255,255,0.4);background:transparent;border-radius:8px;font-weight:600;color:#fff;cursor:pointer;font-size:12px;">Reset</button>
  <button onclick="doLogout()" style="padding:6px 14px;border:2px solid #fca5a5;background:rgba(255,255,255,0.1);border-radius:8px;font-weight:600;color:#fef2f2;cursor:pointer;font-size:12px;">Thoát</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="checkin" onclick="switchTab('checkin')">Check-in</div>
  <div class="tab" data-tab="free" onclick="switchTab('free')">AI Tự do</div>
  <div class="tab" data-tab="chat" onclick="switchTab('chat')">Chat AI</div>
  <div class="tab" data-tab="test" onclick="switchTab('test');loadTestData()">Test</div>
</div>

<!-- CHECK-IN PANEL (Chat-based triage) -->
<div class="panel active" id="panel-checkin">
  <div class="messages" id="checkin-messages"></div>
  <div id="checkin-start" style="padding:20px;text-align:center;">
    <button onclick="startTriageChat()" style="padding:14px 32px;background:#08b8a2;color:#fff;border:none;border-radius:12px;font-weight:700;font-size:16px;cursor:pointer;">Bắt đầu check-in</button>
  </div>
  <div id="checkin-status-buttons" style="display:none;padding:12px 16px;background:#f9f9f9;border-top:1px solid #eee;">
    <div id="checkin-status-label" style="font-size:13px;color:#555;font-weight:600;margin-bottom:8px;">Hôm nay bạn thấy thế nào?</div>
    <div style="display:flex;gap:8px;">
      <button onclick="selectStatus('fine')" id="btn-fine" style="flex:1;padding:12px;border:2px solid #22c55e;background:#f0fdf4;color:#16a34a;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">Tôi ổn</button>
      <button onclick="selectStatus('tired')" id="btn-tired" style="flex:1;padding:12px;border:2px solid #f59e0b;background:#fffbeb;color:#d97706;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">Hơi mệt</button>
      <button onclick="selectStatus('very_tired')" id="btn-very-tired" style="flex:1;padding:12px;border:2px solid #ef4444;background:#fef2f2;color:#dc2626;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">Rất mệt</button>
    </div>
  </div>
  <div class="input-area" id="checkin-input-area" style="display:none;">
    <input id="checkin-input" placeholder="Nhập tin nhắn...">
    <button onclick="sendTriageChat()" id="checkin-send">Gửi</button>
  </div>
  <div id="checkin-conclusion" style="display:none;padding:16px;background:#f8fafc;border-top:1px solid #e5e5e5;">
    <div id="checkin-conclusion-content"></div>
    <div style="margin-top:12px;text-align:center;display:flex;gap:8px;justify-content:center;" id="checkin-conclusion-buttons"></div>
  </div>
  <div id="status-bar" class="status-bar" style="display:none;">
    <span class="dot"></span>
    <span id="status-text"></span>
  </div>
</div>

<!-- AI TỰ DO PANEL -->
<div class="panel" id="panel-free">
  <div class="messages" id="free-messages"></div>
  <div class="input-area">
    <textarea id="free-input" rows="2" placeholder="Nói tình trạng của bạn..."></textarea>
    <button onclick="sendFree()" id="free-send">Gửi</button>
  </div>
</div>

<!-- CHAT PANEL -->
<div class="panel" id="panel-chat">
  <div class="messages" id="chat-messages"></div>
  <div class="input-area">
    <textarea id="chat-input" rows="2" placeholder="Hỏi Asinu bất cứ điều gì..."></textarea>
    <button onclick="sendChat()" id="chat-send">Gửi</button>
  </div>
</div>

<!-- TEST PANEL — Dashboard tổng hợp, auto-load -->
<div class="panel" id="panel-test">
  <div class="messages" id="test-messages" style="padding:16px;">
    <div class="msg system">Đang tải thông tin hệ thống...</div>
  </div>
</div>

</div><!-- end app-screen -->

<script>
// ─── AUTH ───
let authToken = localStorage.getItem('asinu_token') || null;
let authUser = null;
let authProfile = null; // onboarding profile (birth_year, gender, medical_conditions...)

async function doLogin() {
  const id = document.getElementById('login-id').value.trim();
  const pw = document.getElementById('login-pw').value.trim();
  const err = document.getElementById('login-error');
  if (!id || !pw) { err.textContent = 'Nhập đủ thông tin.'; err.style.display = 'block'; return; }
  err.style.display = 'none';
  document.getElementById('login-btn').disabled = true;
  try {
    const res = await fetch('/api/auth/email/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: id, password: pw }),
    });
    const data = await res.json();
    if (!data.ok || !data.token) { err.textContent = data.error || 'Sai tài khoản hoặc mật khẩu.'; err.style.display = 'block'; return; }
    authToken = data.token;
    localStorage.setItem('asinu_token', authToken);
    await initApp();
  } catch (e) { err.textContent = 'Lỗi: ' + e.message; err.style.display = 'block'; }
  finally { document.getElementById('login-btn').disabled = false; }
}

function doLogout() {
  authToken = null; authUser = null;
  localStorage.removeItem('asinu_token');
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function apiHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + authToken };
}

async function initApp() {
  try {
    const meRes = await fetch('/api/auth/me', { headers: apiHeaders() });
    const meData = await meRes.json();
    if (!meData.ok) { doLogout(); return; }
    authUser = meData.user;
    document.getElementById('user-label').textContent = authUser.email || authUser.phone || '';
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';

    // Load onboarding profile for triage — map to engine format
    try {
      const pRes = await fetch('/api/mobile/profile', { headers: apiHeaders() });
      const pData = await pRes.json();
      if (pData.ok && pData.profile) {
        const p = pData.profile;
        authProfile = {
          full_name: p.name || authUser.full_name || authUser.email,
          birth_year: p.dateOfBirth ? new Date(p.dateOfBirth).getFullYear() : (p.age ? new Date().getFullYear() - p.age : null),
          gender: p.gender || null,
          medical_conditions: p.chronicDiseases || [],
          height_cm: p.heightCm ? parseFloat(p.heightCm) : null,
          weight_kg: p.weightKg ? parseFloat(p.weightKg) : null,
          daily_medication: p.chronicDiseases?.length > 0 ? 'Có' : 'Không',
        };
      } else {
        authProfile = { full_name: authUser.email, birth_year: null, gender: null, medical_conditions: [] };
      }
    } catch { authProfile = { full_name: authUser.email, birth_year: null, gender: null, medical_conditions: [] }; }
    console.log('[Profile]', authProfile);

    // Load chat history
    try {
      const hRes = await fetch('/api/mobile/chat/history', { headers: apiHeaders() });
      const hData = await hRes.json();
      if (hData.ok && hData.history) {
        document.getElementById('chat-messages').innerHTML = '';
        for (const m of hData.history.slice(-30)) {
          addMsg('chat-messages', m.role === 'user' ? 'user' : 'ai', m.text);
        }
      }
    } catch {}

    resetSession();
  } catch { doLogout(); }
}

document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ─── UTILS ───
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function addMsg(container, role, text, meta) {
  const el = document.getElementById(container);
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  if (meta) { const m = document.createElement('div'); m.className = 'meta'; m.innerHTML = meta; div.appendChild(m); }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ─── CHECK-IN (Chat-based triage) ───
let triageChatHistory = []; // [{role:'user'|'assistant', content:string}]
let triageChatDone = false;
let triageChatSending = false;

function resetSession() {
  triageChatHistory = [];
  triageChatDone = false;
  triageChatSending = false;
  triageInitialStatus = null;
  document.getElementById('checkin-messages').innerHTML = '';
  document.getElementById('checkin-input').value = '';
  document.getElementById('checkin-start').style.display = 'block';
  document.getElementById('checkin-status-buttons').style.display = 'none';
  document.getElementById('checkin-input-area').style.display = 'none';
  document.getElementById('checkin-conclusion').style.display = 'none';
  document.getElementById('status-bar').style.display = 'none';
  document.getElementById('free-messages').innerHTML = '';
  document.getElementById('free-input').value = '';
  freeHistory = [];
  addMsg('free-messages', 'system', 'Nói tình trạng sức khoẻ. AI sẽ hỏi thêm để hiểu rõ.');
}

function resetTriageChat() {
  triageChatHistory = [];
  triageChatDone = false;
  triageChatSending = false;
  triageInitialStatus = null;
  lastTriageResult = null;
  followUpCount = 0;
  document.getElementById('checkin-messages').innerHTML = '';
  document.getElementById('checkin-input').value = '';
  document.getElementById('checkin-start').style.display = 'block';
  document.getElementById('checkin-status-buttons').style.display = 'none';
  document.getElementById('checkin-input-area').style.display = 'none';
  document.getElementById('checkin-conclusion').style.display = 'none';
  document.getElementById('status-bar').style.display = 'none';
}

let triageInitialStatus = null; // 'fine' | 'tired' | 'very_tired'

async function startTriageChat() {
  document.getElementById('checkin-start').style.display = 'none';
  document.getElementById('checkin-conclusion').style.display = 'none';
  document.getElementById('checkin-messages').innerHTML = '';
  triageChatHistory = [];
  triageChatDone = false;
  triageInitialStatus = null;
  lastTriageResult = null;
  followUpCount = 0;
  window._simulatedHour = null;
  // Reset button labels
  document.getElementById('checkin-status-label').textContent = 'Hôm nay bạn thấy thế nào?';
  document.getElementById('btn-fine').textContent = 'Tôi ổn';
  document.getElementById('btn-tired').textContent = 'Hơi mệt';
  document.getElementById('btn-very-tired').textContent = 'Rất mệt';
  // Send empty message to trigger AI greeting
  await callTriageChat('');
  // Show status buttons after greeting
  document.getElementById('checkin-status-buttons').style.display = 'block';
  document.getElementById('checkin-input-area').style.display = 'none';
}

function selectStatus(status) {
  triageInitialStatus = status;
  document.getElementById('checkin-status-buttons').style.display = 'none';

  const labels = { fine: 'Tôi ổn', tired: 'Hơi mệt', very_tired: 'Rất mệt' };
  const label = labels[status] || status;
  addMsg('checkin-messages', 'user', label);

  if (status === 'fine') {
    // "Tôi ổn" → gửi message rõ ràng cho AI, AI tự kết luận
    const prevSummary = lastTriageResult ? lastTriageResult.summary : null;
    callTriageChatWithSummary('Tôi cảm thấy ổn, không có triệu chứng gì bất thường', prevSummary);
    return;
  }

  if (false) {

    addMsg('checkin-messages', 'ai', reply);
    triageChatDone = true;
    lastTriageResult = { summary: 'Cảm thấy ổn', severity: 'low', followUpHours };
    document.getElementById('checkin-input-area').style.display = 'none';
    showTriageConclusion({
      severity: 'low', summary: 'Cảm thấy ổn',
      recommendation: 'Tiếp tục nghỉ ngơi, uống đủ nước.',
      needsDoctor: false, needsFamilyAlert: false, hasRedFlag: false, followUpHours,
    });
    return;
  }

  // Hơi mệt / Rất mệt → gửi cho AI hỏi tiếp
  document.getElementById('checkin-input-area').style.display = 'flex';
  const prevSummary = lastTriageResult ? lastTriageResult.summary : null;
  callTriageChatWithSummary(label, prevSummary);
  document.getElementById('checkin-input').focus();
}

async function sendTriageChat() {
  const input = document.getElementById('checkin-input');
  const text = input.value.trim();
  if (!text || triageChatDone || triageChatSending) return;
  input.value = '';
  addMsg('checkin-messages', 'user', text);
  const prevSummary = lastTriageResult ? lastTriageResult.summary : null;
  await callTriageChatWithSummary(text, prevSummary);
}

// callTriageChat dùng cho initial greeting (không có prevSummary)
async function callTriageChat(userMessage) {
  await callTriageChatWithSummary(userMessage, null);
}

let lastTriageResult = null; // lưu kết quả check-in trước cho follow-up
let followUpCount = 0;

function showTriageConclusion(data) {
  const sev = data.severity || 'low';
  const container = document.getElementById('checkin-conclusion-content');
  const buttons = document.getElementById('checkin-conclusion-buttons');

  // Lưu kết quả cho follow-up
  lastTriageResult = {
    summary: data.summary || '',
    severity: sev,
    needsDoctor: data.needsDoctor,
    followUpHours: data.followUpHours,
  };

  let html = `<div style="font-weight:700;font-size:15px;margin-bottom:10px;">Kết luận Check-in</div>`;
  html += `<div style="margin-bottom:8px;"><span class="badge ${sev}">${sev.toUpperCase()}</span></div>`;
  if (data.summary) html += `<div style="font-size:14px;color:#333;margin-bottom:6px;"><strong>Tóm tắt:</strong> ${data.summary}</div>`;
  if (data.recommendation) html += `<div style="font-size:14px;color:#333;margin-bottom:6px;"><strong>Khuyến nghị:</strong> ${data.recommendation}</div>`;

  let indicators = [];
  if (data.needsDoctor != null) indicators.push(`Cần gặp bác sĩ: ${data.needsDoctor ? '<span style="color:#dc2626;font-weight:700;">CÓ</span>' : 'Không'}`);
  if (data.needsFamilyAlert != null) indicators.push(`Cảnh báo gia đình: ${data.needsFamilyAlert ? '<span style="color:#dc2626;font-weight:700;">CÓ</span>' : 'Không'}`);
  if (data.hasRedFlag != null) indicators.push(`Red flag: ${data.hasRedFlag ? '<span style="color:#dc2626;font-weight:700;">CÓ</span>' : 'Không'}`);
  if (data.followUpHours) indicators.push(`Follow-up sau: ${data.followUpHours}h`);
  if (indicators.length) html += `<div style="font-size:12px;color:#666;margin-top:8px;line-height:1.8;">${indicators.join('<br>')}</div>`;

  container.innerHTML = html;
  document.getElementById('checkin-conclusion').style.display = 'block';

  // Buttons: Follow-up luôn có (trừ khi follow-up "Tôi ổn" lần 2 = resolved hoàn toàn)
  const isFullyResolved = followUpCount > 0 && sev === 'low' && !data.needsDoctor;
  const followUpLabel = triageInitialStatus === 'fine'
    ? 'Follow-up buổi tối (9h tối)'
    : `Follow-up (${data.followUpHours}h sau)`;

  if (isFullyResolved) {
    buttons.innerHTML = `
      <div style="color:#16a34a;font-weight:600;font-size:14px;margin-bottom:8px;">Session hoàn tất — Chúc ngủ ngon!</div>
      <button onclick="resetTriageChat()" style="padding:10px 24px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">Check-in mới</button>
    `;
  } else {
    buttons.innerHTML = `
      <button onclick="startFollowUp()" style="padding:10px 24px;background:#08b8a2;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">${followUpLabel}</button>
      <button onclick="resetTriageChat()" style="padding:10px 24px;background:#94a3b8;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">Reset</button>
    `;
  }

  // Status bar
  const bar = document.getElementById('status-bar');
  const statusText = document.getElementById('status-text');
  bar.style.display = 'flex';
  const stateClass = sev === 'high' || sev === 'critical' ? 'high_alert' : sev === 'medium' ? 'follow_up' : isFullyResolved ? 'resolved' : 'monitoring';
  bar.className = 'status-bar ' + stateClass;
  let statusLabel = `Severity: ${sev.toUpperCase()}`;
  if (data.followUpHours) statusLabel += ` | Follow-up: ${data.followUpHours}h`;
  statusText.textContent = statusLabel;
}

async function startFollowUp() {
  followUpCount++;
  const prevSummary = lastTriageResult ? lastTriageResult.summary : null;
  const prevSeverity = lastTriageResult ? lastTriageResult.severity : 'low';

  // Tính giờ giả lập cho follow-up — cộng dồn từ giả lập trước
  const baseHour = window._simulatedHour || parseInt(new Date().toLocaleString('en-US', { timeZone: 'Asia/Ho_Chi_Minh', hour: 'numeric', hour12: false }));
  const fupHours = lastTriageResult ? lastTriageResult.followUpHours : 3;
  let simulatedHour = baseHour + fupHours;
  if (simulatedHour >= 24) simulatedHour -= 24;
  // Nếu follow-up buổi tối cho "Tôi ổn" lần đầu → giả lập 21h
  if (triageInitialStatus === 'fine' && followUpCount === 1) simulatedHour = 21;
  window._simulatedHour = simulatedHour;

  // UI cho follow-up — giữ history cũ, chỉ clear UI
  document.getElementById('checkin-conclusion').style.display = 'none';
  document.getElementById('checkin-messages').innerHTML = '';
  document.getElementById('checkin-status-buttons').style.display = 'none';
  document.getElementById('status-bar').style.display = 'none';
  removeCheckinOptions();
  triageChatDone = false;

  // Cập nhật label và nút cho follow-up context
  const isEvening = triageInitialStatus === 'fine' && followUpCount === 1;
  if (isEvening) {
    document.getElementById('checkin-status-label').textContent = 'Buổi tối — Chú thấy thế nào?';
    document.getElementById('btn-fine').textContent = 'Vẫn ổn';
    document.getElementById('btn-tired').textContent = 'Hơi mệt';
    document.getElementById('btn-very-tired').textContent = 'Rất mệt';
  } else {
    document.getElementById('checkin-status-label').textContent = `Follow-up lần ${followUpCount} — So với lần trước?`;
    document.getElementById('btn-fine').textContent = 'Đã đỡ';
    document.getElementById('btn-tired').textContent = 'Vẫn vậy';
    document.getElementById('btn-very-tired').textContent = 'Nặng hơn';
  }

  const tod = simulatedHour < 12 ? 'sáng' : simulatedHour < 18 ? 'chiều' : 'tối';
  addMsg('checkin-messages', 'system', `Follow-up lần ${followUpCount} — Giả lập ${simulatedHour}:00 (buổi ${tod})`);

  // Gọi AI greeting — nhưng KHÔNG cho isDone=true ở greeting (force ignore)
  const savedDone = triageChatDone;
  await callTriageChatWithSummary('', prevSummary);
  // Nếu greeting isDone=true (heuristic sai) → revert, vẫn hiện nút
  if (triageChatDone && !savedDone) {
    triageChatDone = false;
    document.getElementById('checkin-conclusion').style.display = 'none';
  }
  // Hiện 3 nút sau greeting
  document.getElementById('checkin-status-buttons').style.display = 'block';
  document.getElementById('checkin-input-area').style.display = 'none';
}

async function callTriageChatWithSummary(userMessage, prevSummary) {
  triageChatSending = true;
  document.getElementById('checkin-send').disabled = true;

  if (userMessage) {
    triageChatHistory.push({ role: 'user', content: userMessage });
  }

  addMsg('checkin-messages', 'system', 'AI đang suy nghĩ...');

  try {
    const res = await fetch('/api/test/triage-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: userMessage,
        profile: authProfile || {},
        history: triageChatHistory,
        healthContext: {},
        previousSessionSummary: prevSummary,
        initialStatus: triageInitialStatus,
        simulatedHour: window._simulatedHour || null,
      }),
    });
    removeLast('checkin-messages', 'AI đang');
    const data = await res.json();

    if (data.error) {
      addMsg('checkin-messages', 'system', 'Lỗi:' + data.error);
      triageChatSending = false;
      document.getElementById('checkin-send').disabled = false;
      return;
    }

    const reply = data.reply || '';
    triageChatHistory.push({ role: 'assistant', content: reply });

    if (data.isDone) {
      triageChatDone = true;
      addMsg('checkin-messages', 'ai', reply);
      document.getElementById('checkin-input-area').style.display = 'none';
      removeCheckinOptions();
      console.log('[DEBUG] Conclusion data from API:', JSON.stringify({severity:data.severity, needsDoctor:data.needsDoctor, summary:data.summary}));
      console.log('[DEBUG] Profile sent:', JSON.stringify(authProfile));
      showTriageConclusion(data);
    } else {
      addMsg('checkin-messages', 'ai', reply);
      // Hiện options chỉ khi đã chọn trạng thái (không hiện ở greeting)
      if (triageInitialStatus && data.options && data.options.length > 0) {
        showCheckinOptions(data.options);
      } else {
        removeCheckinOptions();
      }
    }
  } catch (e) {
    removeLast('checkin-messages', 'AI đang');
    addMsg('checkin-messages', 'system', 'Lỗi:' + e.message);
  }

  triageChatSending = false;
  document.getElementById('checkin-send').disabled = false;
}

function showCheckinOptions(options) {
  removeCheckinOptions();
  const container = document.createElement('div');
  container.id = 'checkin-quick-options';
  container.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;padding:8px 16px;';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.textContent = opt;
    btn.style.cssText = 'padding:8px 14px;border:1.5px solid #08b8a2;border-radius:16px;background:#f0fdfa;font-size:13px;cursor:pointer;color:#08b8a2;font-weight:600;transition:all 0.2s;';
    btn.onmouseover = () => { btn.style.background = '#08b8a2'; btn.style.color = '#fff'; };
    btn.onmouseout = () => { btn.style.background = '#f0fdfa'; btn.style.color = '#08b8a2'; };
    btn.onclick = () => {
      document.getElementById('checkin-input').value = opt;
      sendTriageChat();
    };
    container.appendChild(btn);
  });
  // Thêm nút "Khác..." để user gõ tự do
  const otherBtn = document.createElement('button');
  otherBtn.textContent = 'Khác...';
  otherBtn.style.cssText = 'padding:8px 14px;border:1.5px dashed #ccc;border-radius:16px;background:#fff;font-size:13px;cursor:pointer;color:#999;font-weight:600;';
  otherBtn.onclick = () => { removeCheckinOptions(); document.getElementById('checkin-input').focus(); };
  container.appendChild(otherBtn);
  document.getElementById('checkin-messages').parentNode.insertBefore(container, document.getElementById('checkin-input-area'));
}

function removeCheckinOptions() {
  const old = document.getElementById('checkin-quick-options');
  if (old) old.remove();
}

function removeLast(container, keyword) {
  const el = document.getElementById(container);
  const last = el.lastChild;
  if (last && last.textContent.includes(keyword)) el.removeChild(last);
}

// ─── AI TỰ DO ───
let freeHistory = [];
let freeSending = false;
async function sendFree() {
  const input = document.getElementById('free-input');
  const text = input.value.trim(); if (!text || freeSending) return;
  freeSending = true;
  document.getElementById('free-send').disabled = true; input.value = '';
  addMsg('free-messages','user',text);
  addMsg('free-messages','system','AI đang trả lời...');
  try {
    const res = await fetch('/api/test/free-triage', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, profile: authProfile || {}, history: freeHistory }),
    });
    removeLast('free-messages','AI đang');
    const data = await res.json();
    const reply = data.reply || data.error || 'Lỗi';
    freeHistory.push({ role: 'user', content: text });
    freeHistory.push({ role: 'assistant', content: reply });
    addMsg('free-messages','ai',reply);
  } catch (e) { removeLast('free-messages','AI đang'); addMsg('free-messages','system','Lỗi: '+e.message); }
  finally { freeSending = false; document.getElementById('free-send').disabled = false; }
}

// ─── CHAT AI (dùng API thật /api/mobile/chat) ───
let chatSending = false;
async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim(); if (!text || !authToken || chatSending) return;
  chatSending = true;
  document.getElementById('chat-send').disabled = true; input.value = '';
  addMsg('chat-messages','user',text);
  addMsg('chat-messages','system','AI đang trả lời...');
  try {
    const res = await fetch('/api/mobile/chat', {
      method: 'POST', headers: apiHeaders(),
      body: JSON.stringify({ message: text, client_ts: Date.now() }),
    });
    removeLast('chat-messages','AI đang');
    const data = await res.json();
    if (data.ok) { addMsg('chat-messages','ai',data.reply); }
    else { addMsg('chat-messages','system','Lỗi: '+(data.error||'Không rõ')); }
  } catch (e) { removeLast('chat-messages','AI đang'); addMsg('chat-messages','system','Lỗi: '+e.message); }
  finally { chatSending = false; document.getElementById('chat-send').disabled = false; }
}

// ─── Enter key handlers ───
document.getElementById('checkin-input').addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); sendTriageChat(); } });
document.getElementById('free-input').addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendFree(); } });
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendChat(); } });

// ─── TEST PANEL — Auto-load dashboard ───
function addTestMsg(role, text, meta) { addMsg('test-messages', role, text, meta); }
function clearTest() { document.getElementById('test-messages').innerHTML = ''; }
async function testFetch(url) { try { return await (await fetch(url)).json(); } catch (e) { return { error: e.message }; } }

async function loadTestData() {
  if (!authUser) return;
  clearTest();
  const uid = authUser.id;

  // Lifecycle
  const lc = await testFetch('/api/health/lifecycle');
  if (lc.ok) {
    addTestMsg('ai', '👥 Lifecycle', `Active: ${lc.stats.active} | Semi: ${lc.stats.semi_active} | Inactive: ${lc.stats.inactive} | Churned: ${lc.stats.churned}`);
  }

  // Notification preview
  const notif = await testFetch(`/api/health/notif-preview/${uid}/morning`);
  if (notif.ok) {
    addTestMsg('ai', '🔔 ' + notif.message, `template: ${notif.templateId}`);
  }

  // Re-engagement
  const re = await testFetch(`/api/health/reengagement-preview/${uid}`);
  if (re.ok) {
    if (re.escalation) {
      addTestMsg('ai', '🔄 Re-engagement: ' + re.message?.text, `level: ${re.escalation.level}`);
    } else {
      addTestMsg('system', '✅ Active — không cần re-engagement');
    }
  }

  // Cache
  const cache = await testFetch('/api/health/cache/global');
  if (cache.ok) {
    addTestMsg('system', `💾 Cache: ${cache.stats.total_active_scripts} scripts | ${cache.stats.total_reuses} reuses`);
  }

  // AI cache + Router
  const aiCache = await testFetch('/api/health/ai/cache-stats');
  const router = await testFetch('/api/health/ai/route-stats');
  if (aiCache.ok) addTestMsg('system', `🧠 AI Cache: hits=${aiCache.stats.hits} | misses=${aiCache.stats.misses} | rate=${aiCache.stats.hitRate}%`);
  if (router.ok) addTestMsg('system', `🔀 Router: small=${router.stats.smallCalls} | big=${router.stats.bigCalls} | saving=${router.stats.smallPct}%`);

  // Last cycle
  const rnd = await testFetch('/api/health/rnd-cycle/last');
  if (rnd.ok && rnd.log) {
    addTestMsg('system', `⚙️ R&D: ${rnd.log.status} | active=${rnd.log.active_processed} | semi=${rnd.log.semi_active_processed} | ${rnd.log.elapsed_ms}ms`);
  }
}

// ─── Init ───
if (authToken) initApp();
