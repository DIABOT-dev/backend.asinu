<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asinu AI Test Console</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; height: 100vh; display: flex; flex-direction: column; }

.header { background: linear-gradient(135deg, #08b8a2, #069b87); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; }
.header select { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 10px; font-size: 13px; }
.header select option { color: #333; }

.tabs { display: flex; background: #fff; border-bottom: 2px solid #e5e5e5; }
.tab { flex: 1; padding: 12px; text-align: center; font-weight: 600; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; color: #666; transition: all 0.2s; }
.tab.active { color: #08b8a2; border-bottom-color: #08b8a2; }

.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 85%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
.msg.ai { background: #fff; color: #333; align-self: flex-start; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
.msg.user { background: #08b8a2; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.system { background: #fef3c7; color: #92400e; align-self: center; font-size: 12px; border-radius: 8px; text-align: center; }
.msg .meta { font-size: 11px; color: #999; margin-top: 6px; }
.msg.ai .meta { color: #aaa; }

.options { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 16px; }
.opt-btn { padding: 8px 16px; border-radius: 20px; border: 2px solid #08b8a2; background: #fff; color: #08b8a2; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.opt-btn:hover { background: #08b8a2; color: #fff; }
.opt-btn.selected { background: #08b8a2; color: #fff; }

.input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #e5e5e5; display: flex; gap: 8px; }
.input-area input, .input-area textarea { flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 14px; outline: none; resize: none; }
.input-area input:focus, .input-area textarea:focus { border-color: #08b8a2; }
.input-area button { padding: 10px 20px; background: #08b8a2; color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; cursor: pointer; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge.high { background: #fecaca; color: #dc2626; }
.badge.medium { background: #fef3c7; color: #d97706; }
.badge.low { background: #dcfce7; color: #16a34a; }

.status-bar { padding: 8px 16px; font-size: 12px; font-weight: 600; border-top: 1px solid #e0f2f1; display: flex; align-items: center; gap: 8px; }
.status-bar .dot { width: 8px; height: 8px; border-radius: 50%; }
.status-bar.monitoring { background: #f0fdf4; color: #16a34a; }
.status-bar.monitoring .dot { background: #22c55e; }
.status-bar.follow_up { background: #fffbeb; color: #d97706; }
.status-bar.follow_up .dot { background: #f59e0b; }
.status-bar.high_alert { background: #fef2f2; color: #dc2626; }
.status-bar.high_alert .dot { background: #ef4444; }
.status-bar.resolved { background: #f0f9ff; color: #2563eb; }
.status-bar.resolved .dot { background: #3b82f6; }

.checkin-buttons { padding: 12px 16px; background: #f9f9f9; border-top: 1px solid #eee; }
.checkin-buttons .label { font-size: 13px; color: #555; font-weight: 600; margin-bottom: 8px; }
.checkin-buttons .sub-label { font-size: 11px; color: #999; margin-bottom: 6px; }
.checkin-buttons .btn-row { display: flex; gap: 8px; }
.checkin-buttons .btn-row button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.checkin-buttons .btn-row button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="header">
  <h1>Asinu AI Test</h1>
  <select id="profileSelect">
    <option value="young_male">22M — Bạn/Mình</option>
    <option value="mid_female">45F Huyết áp — Chị/Em</option>
    <option value="old_male" selected>68M Tiểu đường+Tim — Chú/Cháu</option>
    <option value="old_female">65F Tiểu đường+HA — Cô/Cháu</option>
  </select>
  <button onclick="resetAll()" style="padding:6px 14px;border:2px solid #ef4444;background:#fef2f2;border-radius:8px;font-weight:600;color:#dc2626;cursor:pointer;font-size:12px;">Reset session</button>
  <button onclick="clearMemory()" style="padding:6px 14px;border:2px solid #f59e0b;background:#fffbeb;border-radius:8px;font-weight:600;color:#d97706;cursor:pointer;font-size:12px;">Xóa memory</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="checkin" onclick="switchTab('checkin')">Check-in</div>
  <div class="tab" data-tab="free" onclick="switchTab('free')">AI Tự do</div>
  <div class="tab" data-tab="chat" onclick="switchTab('chat')">Chat AI</div>
</div>

<!-- CHECK-IN PANEL -->
<div class="panel active" id="panel-checkin">
  <div class="messages" id="checkin-messages"></div>
  <div id="checkin-options"></div>
  <div class="input-area" id="checkin-input-area">
    <input id="checkin-input" placeholder="Nhập triệu chứng hoặc chọn ở trên...">
    <button onclick="sendCheckin()" id="checkin-send">Gửi</button>
  </div>
  <div id="status-bar" class="status-bar" style="display:none;">
    <span class="dot"></span>
    <span id="status-text"></span>
  </div>
  <div class="checkin-buttons" id="checkin-buttons"></div>
</div>

<!-- AI TỰ DO PANEL -->
<div class="panel" id="panel-free">
  <div class="messages" id="free-messages"></div>
  <div class="input-area">
    <textarea id="free-input" rows="2" placeholder="Nói tình trạng của bạn... VD: Tôi hơi mệt từ sáng"></textarea>
    <button onclick="sendFree()" id="free-send">Gửi</button>
  </div>
  <div style="padding:6px 16px;background:#f9f9f9;border-top:1px solid #eee;display:flex;gap:8px;align-items:center;">
    <span style="font-size:11px;color:#999;">Gợi ý:</span>
    <button onclick="document.getElementById('free-input').value='Tôi hơi mệt từ sáng';sendFree()" style="padding:4px 10px;border:1px solid #ddd;border-radius:12px;background:#fff;font-size:11px;cursor:pointer;color:#555;">Tôi hơi mệt</button>
    <button onclick="document.getElementById('free-input').value='Tôi bị chóng mặt và buồn nôn';sendFree()" style="padding:4px 10px;border:1px solid #ddd;border-radius:12px;background:#fff;font-size:11px;cursor:pointer;color:#555;">Chóng mặt</button>
    <button onclick="document.getElementById('free-input').value='Hôm nay tôi khoẻ';sendFree()" style="padding:4px 10px;border:1px solid #ddd;border-radius:12px;background:#fff;font-size:11px;cursor:pointer;color:#555;">Tôi khoẻ</button>
  </div>
</div>

<!-- CHAT PANEL -->
<div class="panel" id="panel-chat">
  <div id="chat-welcome" style="padding:20px 16px;text-align:center;">
    <div style="font-size:40px;margin-bottom:8px;">👋</div>
    <div id="chat-greeting" style="font-size:16px;font-weight:600;color:#333;margin-bottom:4px;"></div>
    <div style="font-size:13px;color:#888;margin-bottom:16px;">Asinu luôn ở đây lắng nghe. Hỏi bất cứ điều gì nhé!</div>
    <div id="chat-chips" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
  </div>
  <div class="messages" id="chat-messages"></div>
  <div class="input-area">
    <textarea id="chat-input" rows="2" placeholder="Hỏi Asinu bất cứ điều gì..."></textarea>
    <button onclick="sendChat()" id="chat-send">Gửi</button>
  </div>
</div>

<script>
const PROFILES = {
  young_male: { birth_year: 2004, gender: 'Nam', medical_conditions: [], daily_medication: 'Không', height_cm: 172, weight_kg: 65, full_name: 'Nguyễn Minh Tuấn' },
  mid_female: { birth_year: 1981, gender: 'Nữ', medical_conditions: ['Cao huyết áp'], daily_medication: 'Có', height_cm: 160, weight_kg: 55, full_name: 'Lê Thị Hương' },
  old_male: { birth_year: 1958, gender: 'Nam', medical_conditions: ['Tiểu đường', 'Cao huyết áp', 'Tim mạch'], daily_medication: 'Có', height_cm: 165, weight_kg: 68, full_name: 'Trần Văn Hùng' },
  old_female: { birth_year: 1961, gender: 'Nữ', medical_conditions: ['Tiểu đường', 'Cao huyết áp'], daily_medication: 'Có', height_cm: 155, weight_kg: 60, full_name: 'Nguyễn Thị Mai' },
};

// ─── Session state (giống app thật) ───
let session = {
  flowState: null,       // null | 'monitoring' | 'follow_up' | 'high_alert' | 'resolved'
  initialStatus: null,
  currentStatus: null,
  triageSummary: null,
  triageSeverity: null,
  followUpCount: 0,
  followUpHours: null,
};
let checkinState = { status: null, phase: 'initial', answers: [], currentQ: null, done: false };
let chatHistory = [];

function getProfile() { return PROFILES[document.getElementById('profileSelect').value]; }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
}

function addMsg(container, role, text, meta) {
  const el = document.getElementById(container);
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  if (meta) { const m = document.createElement('div'); m.className = 'meta'; m.innerHTML = meta; div.appendChild(m); }
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

// ─── Status bar ───
function updateStatusBar() {
  const bar = document.getElementById('status-bar');
  const text = document.getElementById('status-text');
  if (!session.flowState) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  bar.className = 'status-bar ' + session.flowState;
  const labels = {
    monitoring: 'Monitoring — Đang theo dõi, follow-up lúc 21h',
    follow_up: `Follow-up — Theo dõi sau ${session.followUpHours || 3}h`,
    high_alert: `High Alert — Theo dõi sau ${session.followUpHours || 1}h`,
    resolved: 'Resolved — Hoàn tất, chúc ngủ ngon!',
  };
  text.textContent = `${labels[session.flowState]} | Follow-up #${session.followUpCount}`;
}

// ─── Render buttons theo flow state ───
function updateButtons() {
  const container = document.getElementById('checkin-buttons');
  const inputArea = document.getElementById('checkin-input-area');

  if (!session.flowState) {
    // Chưa check-in → hiện nút check-in sáng
    inputArea.style.display = 'none';
    container.innerHTML = `
      <div class="label">Hôm nay bạn thế nào?</div>
      <div class="sub-label">Check-in buổi sáng</div>
      <div class="btn-row">
        <button onclick="doInitialCheckin('fine')" style="border:2px solid #22c55e;background:#f0fdf4;color:#16a34a;">Tôi ổn</button>
        <button onclick="doInitialCheckin('tired')" style="border:2px solid #f59e0b;background:#fffbeb;color:#d97706;">Hơi mệt</button>
        <button onclick="doInitialCheckin('very_tired')" style="border:2px solid #ef4444;background:#fef2f2;color:#dc2626;">Rất mệt</button>
      </div>
    `;
  } else if (session.flowState === 'monitoring') {
    // Monitoring → chờ follow-up tối (giả lập bằng nút)
    inputArea.style.display = 'none';
    container.innerHTML = `
      <div class="label">Follow-up buổi tối (giả lập 21h)</div>
      <div class="sub-label">Hệ thống hỏi lại: "Hôm nay thế nào rồi?"</div>
      <div class="btn-row">
        <button onclick="doFollowUp('fine')" style="border:2px solid #22c55e;background:#f0fdf4;color:#16a34a;">Tôi ổn</button>
        <button onclick="doFollowUp('tired')" style="border:2px solid #f59e0b;background:#fffbeb;color:#d97706;">Hơi mệt</button>
        <button onclick="doFollowUp('very_tired')" style="border:2px solid #ef4444;background:#fef2f2;color:#dc2626;">Rất mệt</button>
      </div>
    `;
  } else if (session.flowState === 'follow_up' || session.flowState === 'high_alert') {
    // Đang follow_up hoặc high_alert → hỏi lại sau X giờ
    const hours = session.flowState === 'high_alert' ? (session.followUpHours || 1) : (session.followUpHours || 3);
    const alertLevel = session.flowState === 'high_alert' ? 'KHẨN' : '';
    inputArea.style.display = 'none';
    container.innerHTML = `
      <div class="label">Follow-up sau ${hours}h ${alertLevel ? '(' + alertLevel + ')' : ''}</div>
      <div class="sub-label">Lần trước: "${session.triageSummary}" (${(session.triageSeverity || '').toUpperCase()})</div>
      <div class="btn-row">
        <button onclick="doFollowUp('fine')" style="border:2px solid #22c55e;background:#f0fdf4;color:#16a34a;">Đã đỡ</button>
        <button onclick="doFollowUp('tired')" style="border:2px solid #f59e0b;background:#fffbeb;color:#d97706;">Vẫn vậy</button>
        <button onclick="doFollowUp('very_tired')" style="border:2px solid #ef4444;background:#fef2f2;color:#dc2626;">Nặng hơn</button>
      </div>
    `;
  } else if (session.flowState === 'resolved') {
    // Resolved → hiện nút reset
    inputArea.style.display = 'none';
    container.innerHTML = `
      <div class="label" style="color:#2563eb;">Session hoàn tất!</div>
      <div class="sub-label">Tự reset sau 5 giây hoặc bấm Reset session</div>
      <div class="btn-row">
        <button onclick="resetAll()" style="border:2px solid #3b82f6;background:#eff6ff;color:#2563eb;">Bắt đầu session mới</button>
      </div>
    `;
    setTimeout(() => resetAll(), 5000);
  }
}

// ─── Reset ───
function resetAll() {
  session = { flowState: null, initialStatus: null, currentStatus: null, triageSummary: null, triageSeverity: null, followUpCount: 0, followUpHours: null };
  checkinState = { status: null, phase: 'initial', answers: [], currentQ: null, done: false };
  chatHistory = [];
  document.getElementById('checkin-messages').innerHTML = '';
  document.getElementById('checkin-options').innerHTML = '';
  document.getElementById('checkin-input').value = '';
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('chat-input').value = '';
  const chatWelcome = document.getElementById('chat-welcome');
  if (chatWelcome) chatWelcome.style.display = 'block';
  freeHistory = [];
  document.getElementById('free-messages').innerHTML = '';
  document.getElementById('free-input').value = '';
  updateStatusBar();
  updateButtons();
  updateChatWelcome();
  addMsg('checkin-messages', 'system', 'Session mới. Chọn profile rồi check-in.');
  addMsg('free-messages', 'system', 'Nói tình trạng sức khoẻ của bạn. AI sẽ hỏi thêm để hiểu rõ vấn đề.');
}

// ─── Initial check-in (buổi sáng) ───
function doInitialCheckin(status) {
  session.initialStatus = status;
  session.currentStatus = status;

  if (status === 'fine') {
    session.flowState = 'monitoring';
    addMsg('checkin-messages', 'ai', 'Tuyệt! Bạn đang khoẻ. Asinu sẽ hỏi thăm lại lúc 21h tối nay nhé.');
    updateStatusBar();
    updateButtons();
    return;
  }

  // tired / very_tired → bắt đầu triage AI
  if (status === 'tired') session.flowState = 'follow_up';
  else session.flowState = 'high_alert';

  checkinState = { status, phase: 'initial', answers: [], currentQ: null, done: false, withHistory: false };
  document.getElementById('checkin-messages').innerHTML = '';
  document.getElementById('checkin-options').innerHTML = '';
  document.getElementById('checkin-input-area').style.display = 'flex';
  document.getElementById('checkin-buttons').innerHTML = '';
  const label = status === 'very_tired' ? 'Rất mệt' : 'Hơi mệt';
  addMsg('checkin-messages', 'system', `Check-in sáng: ${label}`);
  updateStatusBar();
  callTriage();
}

// ─── Follow-up (tối / sau Xh) ───
function doFollowUp(newStatus) {
  session.followUpCount++;
  const prevFlowState = session.flowState;
  const prevSummary = session.triageSummary;

  if (newStatus === 'fine') {
    if (prevFlowState === 'monitoring') {
      // Monitoring + fine → RESOLVED
      session.flowState = 'resolved';
      session.currentStatus = 'fine';
      addMsg('checkin-messages', 'ai', 'Tuyệt vời! Hôm nay bạn khoẻ cả ngày. Chúc ngủ ngon nhé!');
      updateStatusBar();
      updateButtons();
      return;
    } else {
      // follow_up/high_alert + fine → chuyển về monitoring (hẹn 21h)
      session.flowState = 'monitoring';
      session.currentStatus = 'fine';
      addMsg('checkin-messages', 'ai', 'Tốt quá! Bạn đã đỡ hơn rồi. Asinu sẽ hỏi lại lúc 21h tối nhé.');
      updateStatusBar();
      updateButtons();
      return;
    }
  }

  // tired / very_tired → triage AI (follow-up phase)
  if (newStatus === 'very_tired' || prevFlowState === 'high_alert') {
    session.flowState = 'high_alert';
  } else {
    session.flowState = 'follow_up';
  }
  session.currentStatus = newStatus;

  checkinState = {
    status: newStatus,
    phase: 'followup',
    answers: [],
    currentQ: null,
    done: false,
    withHistory: true,
    autoAnswer: newStatus === 'very_tired' ? 'mệt hơn trước' : 'vẫn như cũ',
  };
  document.getElementById('checkin-messages').innerHTML = '';
  document.getElementById('checkin-options').innerHTML = '';
  document.getElementById('checkin-input-area').style.display = 'flex';
  document.getElementById('checkin-buttons').innerHTML = '';
  const label = newStatus === 'very_tired' ? 'Nặng hơn' : 'Vẫn vậy';
  addMsg('checkin-messages', 'system', `Follow-up #${session.followUpCount}: ${label} | Trước đó: "${prevSummary || session.initialStatus}"`);
  updateStatusBar();
  callTriage();
}

// ─── Triage AI call ───
async function callTriage() {
  addMsg('checkin-messages', 'system', 'AI đang suy nghĩ...');
  const profile = getProfile();
  try {
    const healthContext = session.followUpCount > 0 ? {
      recentGlucose: [{ value: 195, unit: 'mg/dL', context: 'trước ăn', occurred_at: new Date().toISOString() }],
      recentBP: [{ systolic: 148, diastolic: 92, pulse: 78, occurred_at: new Date().toISOString() }],
      previousCheckins: session.triageSummary ? [{
        session_date: new Date().toISOString().slice(0,10),
        initial_status: session.initialStatus,
        triage_summary: session.triageSummary,
        triage_severity: session.triageSeverity,
      }] : [],
      symptomFrequencyContext: session.followUpCount > 1 ? `- theo dõi: ${session.followUpCount} lần follow-up hôm nay` : '',
      medicationAdherenceContext: 'Thuốc 7 ngày: 5/7 (bỏ 2 ngày)',
      tookMedicationToday: true,
    } : {};

    const res = await fetch('/api/test/triage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status: checkinState.status,
        phase: checkinState.phase,
        lang: 'vi',
        profile,
        healthContext,
        previousAnswers: checkinState.answers,
        previousSessionSummary: checkinState.phase === 'followup' ? (session.triageSummary || null) : null,
      }),
    });

    const msgs = document.getElementById('checkin-messages');
    const last = msgs.lastChild;
    if (last && last.textContent.includes('AI đang')) msgs.removeChild(last);

    const data = await res.json();
    if (data.isDone) {
      checkinState.done = true;
      document.getElementById('checkin-options').innerHTML = '';
      const sev = data.severity || 'low';

      // Lưu kết luận vào session
      session.triageSummary = data.summary || '';
      session.triageSeverity = sev;
      if (data.followUpHours) session.followUpHours = data.followUpHours;

      addMsg('checkin-messages', 'ai',
        `Kết luận\n\n${data.summary || ''}\n\n${data.recommendation || ''}\n\n${data.closeMessage || ''}`,
        `<span class="badge ${sev}">${sev.toUpperCase()}</span> | needsDoctor: ${data.needsDoctor?'CÓ':'không'} | familyAlert: ${data.needsFamilyAlert?'CÓ':'không'} | redFlag: ${data.hasRedFlag?'CÓ':'không'}`
      );

      updateStatusBar();
      updateButtons();
    } else {
      checkinState.currentQ = data.question;
      addMsg('checkin-messages', 'ai', data.question,
        `multiSelect: ${data.multiSelect?'có':'không'} | allowFreeText: ${data.allowFreeText?'có':'không'} | options: ${(data.options||[]).length}`);
      showOptions(data.options, data.multiSelect);
      if (checkinState.autoAnswer && checkinState.answers.length === 0) {
        const auto = checkinState.autoAnswer;
        checkinState.autoAnswer = null;
        setTimeout(() => {
          document.getElementById('checkin-input').value = auto;
          sendCheckin();
        }, 500);
      }
    }
  } catch (err) {
    const msgs = document.getElementById('checkin-messages');
    const last = msgs.lastChild;
    if (last && last.textContent.includes('AI đang')) msgs.removeChild(last);
    addMsg('checkin-messages', 'system', 'Lỗi: ' + err.message);
  }
}

function showOptions(options, multiSelect) {
  const container = document.getElementById('checkin-options');
  container.innerHTML = '';
  if (!options || !options.length) return;
  const wrapper = document.createElement('div');
  wrapper.className = 'options';
  const selected = new Set();
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      if (multiSelect) {
        if (selected.has(opt)) { selected.delete(opt); btn.classList.remove('selected'); }
        else { selected.add(opt); btn.classList.add('selected'); }
        document.getElementById('checkin-input').value = [...selected].join(', ');
      } else {
        document.getElementById('checkin-input').value = opt;
        sendCheckin();
      }
    };
    wrapper.appendChild(btn);
  });
  container.appendChild(wrapper);
}

async function sendCheckin() {
  const input = document.getElementById('checkin-input');
  const text = input.value.trim();
  if (!text || checkinState.done) return;
  input.value = '';
  document.getElementById('checkin-options').innerHTML = '';
  addMsg('checkin-messages', 'user', text);
  checkinState.answers.push({ question: checkinState.currentQ || '', answer: text });
  await callTriage();
}

// ─── Chat welcome + chips ───
function updateChatWelcome() {

  const age = new Date().getFullYear() - profile.birth_year;
  const isMale = profile.gender.includes('Nam');
  let hon = 'bạn';
  if (age >= 60) hon = isMale ? 'chú' : 'cô';
  else if (age >= 40) hon = isMale ? 'anh' : 'chị';
  const name = profile.full_name.trim().split(/\s+/).pop();
  const hour = new Date().getHours();
  let timeGreet = 'Chào';
  if (hour < 12) timeGreet = 'Chào buổi sáng';
  else if (hour < 18) timeGreet = 'Chào buổi chiều';
  else timeGreet = 'Chào buổi tối';

  document.getElementById('chat-greeting').textContent = `${timeGreet}, ${hon} ${name}!`;

  const conditions = profile.medical_conditions || [];
  const chips = [];
  chips.push({ text: 'Hôm nay tôi nên ăn gì?', icon: '🍽' });
  chips.push({ text: 'Tôi nên tập gì hôm nay?', icon: '🏃' });
  chips.push({ text: 'Tôi khó ngủ quá', icon: '😴' });
  if (conditions.some(c => c.includes('Tiểu đường'))) {
    chips.push({ text: 'Đường huyết 195 có cao không?', icon: '🩸' });
    chips.push({ text: 'Tôi quên uống thuốc tiểu đường', icon: '💊' });
  }
  if (conditions.some(c => c.includes('huyết áp'))) {
    chips.push({ text: 'Huyết áp 148/92 có nguy hiểm không?', icon: '❤️' });
    chips.push({ text: 'Cách hạ huyết áp tự nhiên?', icon: '🌿' });
  }
  if (conditions.some(c => c.includes('Tim'))) {
    chips.push({ text: 'Tôi bị đau ngực nhẹ', icon: '💗' });
  }
  chips.push({ text: 'Tôi thấy lo lắng về sức khoẻ', icon: '😟' });
  chips.push({ text: 'Kể chuyện vui cho tôi nghe', icon: '😊' });

  const container = document.getElementById('chat-chips');
  container.innerHTML = chips.map(c =>
    `<button onclick="document.getElementById('chat-input').value='${c.text}';sendChat()" style="padding:8px 14px;border:1.5px solid #e0e0e0;border-radius:20px;background:#fff;font-size:13px;cursor:pointer;color:#555;display:flex;align-items:center;gap:4px;transition:all 0.2s;" onmouseover="this.style.borderColor='#08b8a2';this.style.color='#08b8a2'" onmouseout="this.style.borderColor='#e0e0e0';this.style.color='#555'">${c.icon} ${c.text}</button>`
  ).join('');
}

document.getElementById('profileSelect').addEventListener('change', () => {
  updateChatWelcome();
});

// ─── AI TỰ DO ───
let freeHistory = [];
let freeSending = false;

async function sendFree() {
  const input = document.getElementById('free-input');
  const text = input.value.trim();
  if (!text || freeSending) return;
  freeSending = true;
  document.getElementById('free-send').disabled = true;
  input.value = '';
  addMsg('free-messages', 'user', text);
  addMsg('free-messages', 'system', 'AI đang trả lời...');
  try {
    const res = await fetch('/api/test/free-triage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, profile: getProfile(), history: freeHistory }),
    });
    const msgs = document.getElementById('free-messages');
    const last = msgs.lastChild;
    if (last && last.textContent.includes('AI đang')) msgs.removeChild(last);
    const data = await res.json();
    const reply = data.reply || data.error || 'Lỗi';
    freeHistory.push({ role: 'user', content: text });
    freeHistory.push({ role: 'assistant', content: reply });
    addMsg('free-messages', 'ai', reply);
  } catch (err) {
    const msgs = document.getElementById('free-messages');
    const last = msgs.lastChild;
    if (last && last.textContent.includes('AI đang')) msgs.removeChild(last);
    addMsg('free-messages', 'system', 'Lỗi: ' + err.message);
  } finally {
    freeSending = false;
    document.getElementById('free-send').disabled = false;
  }
}

// ─── CHAT MEMORY (localStorage per profile) ───
function getMemoryKey() {
  return 'asinu_memories_' + document.getElementById('profileSelect').value;
}
function loadMemories() {
  try { return JSON.parse(localStorage.getItem(getMemoryKey()) || '[]'); } catch { return []; }
}
function saveMemories(memories) {
  localStorage.setItem(getMemoryKey(), JSON.stringify(memories.slice(0, 20)));
}
function clearMemory() {
  localStorage.removeItem(getMemoryKey());
  addMsg('chat-messages', 'system', 'Memory đã xóa cho profile này.');
}
async function extractMemories(allMessages) {
  if (allMessages.length < 4) return;
  try {
    const res = await fetch('/api/test/extract-memories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: allMessages, existingMemories: loadMemories() }),
    });
    const data = await res.json();
    if (!data.memories || !data.memories.length) return;
    const existing = loadMemories();
    for (const item of data.memories) {
      if (!item.content || !item.category) continue;
      if (item.action === 'update' && item.old_content) {
        const idx = existing.findIndex(m => m.content === item.old_content);
        if (idx >= 0) existing[idx] = { content: item.content, category: item.category };
        else existing.push({ content: item.content, category: item.category });
      } else {
        existing.push({ content: item.content, category: item.category });
      }
    }
    saveMemories(existing);
    console.log('[Memory] Saved', data.memories.length, 'new memories. Total:', existing.length);
  } catch (err) {
    console.error('[Memory] Extract failed:', err.message);
  }
}

// ─── CHAT ───
function showChatFollowUpChips(reply) {
  // Gợi ý câu hỏi tiếp theo dựa trên nội dung AI vừa trả lời
  const chips = [];
  const r = reply.toLowerCase();
  if (r.includes('đường huyết') || r.includes('tiểu đường') || r.includes('glucose')) {
    chips.push('Nên đo đường huyết lúc nào?');
    chips.push('Thực đơn cho người tiểu đường?');
  }
  if (r.includes('huyết áp') || r.includes('tăng huyết áp')) {
    chips.push('Cách đo huyết áp đúng?');
    chips.push('Thức ăn nào hạ huyết áp?');
  }
  if (r.includes('ngủ') || r.includes('mất ngủ') || r.includes('giấc ngủ')) {
    chips.push('Bài tập thở trước khi ngủ?');
    chips.push('Nên uống gì để dễ ngủ?');
  }
  if (r.includes('tập') || r.includes('vận động') || r.includes('đi bộ')) {
    chips.push('Tập bao lâu mỗi ngày?');
    chips.push('Bài tập nào phù hợp tuổi tôi?');
  }
  if (r.includes('thuốc') || r.includes('medication')) {
    chips.push('Quên thuốc thì làm sao?');
    chips.push('Tác dụng phụ của thuốc?');
  }
  if (r.includes('lo lắng') || r.includes('stress') || r.includes('căng thẳng')) {
    chips.push('Cách giảm stress nhanh?');
    chips.push('Bài tập thư giãn?');
  }
  // Luôn có chip chung
  if (chips.length === 0) {
    chips.push('Kể thêm đi');
    chips.push('Tôi nên làm gì tiếp?');
  }
  chips.push('Cảm ơn Asinu!');

  const container = document.createElement('div');
  container.style.cssText = 'display:flex;flex-wrap:wrap;gap:6px;padding:4px 0;margin-top:8px;';
  chips.slice(0, 3).forEach(c => {
    const btn = document.createElement('button');
    btn.textContent = c;
    btn.style.cssText = 'padding:6px 12px;border:1.5px solid #08b8a2;border-radius:16px;background:#f0fdfa;font-size:12px;cursor:pointer;color:#08b8a2;font-weight:600;transition:all 0.2s;';
    btn.onmouseover = () => { btn.style.background = '#08b8a2'; btn.style.color = '#fff'; };
    btn.onmouseout = () => { btn.style.background = '#f0fdfa'; btn.style.color = '#08b8a2'; };
    btn.onclick = () => { document.getElementById('chat-input').value = c; sendChat(); };
    container.appendChild(btn);
  });
  const el = document.getElementById('chat-messages');
  el.appendChild(container);
  el.scrollTop = el.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  // Ẩn welcome screen khi bắt đầu chat
  const welcome = document.getElementById('chat-welcome');
  if (welcome) welcome.style.display = 'none';

  document.getElementById('chat-send').disabled = true;
  input.value = '';
  addMsg('chat-messages', 'user', text);
  addMsg('chat-messages', 'system', 'AI đang trả lời...');
  try {
    const res = await fetch('/api/test/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, profile: getProfile(), history: chatHistory, memories: loadMemories() }),
    });
    const msgs = document.getElementById('chat-messages');
    const last = msgs.lastChild;
    if (last && last.textContent.includes('AI đang')) msgs.removeChild(last);
    const data = await res.json();
    const reply = data.reply || 'Lỗi';
    chatHistory.push({ sender: 'user', message: text });
    chatHistory.push({ sender: 'assistant', message: reply });
    addMsg('chat-messages', 'ai', reply, `${reply.length} ký tự`);
    showChatFollowUpChips(reply);
    // Extract memories in background
    extractMemories(chatHistory);
  } catch (err) {
    const msgs = document.getElementById('chat-messages');
    const last = msgs.lastChild;
    if (last && last.textContent.includes('AI đang')) msgs.removeChild(last);
    addMsg('chat-messages', 'system', 'Lỗi: ' + err.message);
  } finally {
    document.getElementById('chat-send').disabled = false;
  }
}

// Enter key handlers
let chatSending = false;
document.getElementById('chat-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!chatSending) { chatSending = true; sendChat().finally(() => { chatSending = false; }); }
  }
});
document.getElementById('checkin-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); sendCheckin(); }
});
document.getElementById('free-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendFree();
  }
});

</script>
