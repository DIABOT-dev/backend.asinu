<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asinu AI — Auto Check-in Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; height: 100vh; display: flex; flex-direction: column; }

.header { background: linear-gradient(135deg, #08b8a2, #069b87); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; }
.header .sub { font-size: 12px; opacity: 0.8; flex: 1; }
.header button { padding: 8px 18px; border: 2px solid rgba(255,255,255,0.5); background: transparent; border-radius: 8px; font-weight: 700; color: #fff; cursor: pointer; font-size: 13px; }
.header button:hover { background: rgba(255,255,255,0.15); }
.header button:disabled { opacity: 0.4; cursor: not-allowed; }

.chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }

.section-header { background: linear-gradient(135deg, #065f46, #047857); color: #fff; padding: 14px 20px; border-radius: 14px; font-weight: 800; font-size: 16px; align-self: stretch; text-align: center; margin: 20px 0 8px; letter-spacing: 1px; }
.scenario-header { background: #08b8a2; color: #fff; padding: 10px 16px; border-radius: 12px; font-weight: 700; font-size: 14px; align-self: center; margin: 12px 0 4px; }
.scenario-done { background: #dcfce7; color: #16a34a; padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; align-self: center; margin-bottom: 8px; }

.msg { max-width: 88%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
.msg.user { background: #08b8a2; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.user .label { font-size: 11px; opacity: 0.7; margin-bottom: 4px; }
.msg.ai { background: #fff; color: #333; align-self: flex-start; border: 1px solid #e0e0e0; border-bottom-left-radius: 4px; }
.msg.system { background: #fef3c7; color: #92400e; align-self: center; font-size: 12px; border-radius: 8px; text-align: center; padding: 8px 14px; }
.msg.error { background: #fecaca; color: #dc2626; align-self: center; font-size: 12px; }

.options { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.opt { padding: 5px 12px; border-radius: 16px; border: 1.5px solid #08b8a2; background: #f0fdfa; font-size: 12px; color: #08b8a2; font-weight: 600; }

.result-card { margin-top: 8px; padding: 10px 14px; border-radius: 10px; font-size: 13px; }
.result-card.low { background: #dcfce7; color: #16a34a; }
.result-card.medium { background: #fef3c7; color: #d97706; }
.result-card.high, .result-card.critical { background: #fecaca; color: #dc2626; }

.badge { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-right: 6px; }
.badge.low { background: #dcfce7; color: #16a34a; }
.badge.medium { background: #fef3c7; color: #d97706; }
.badge.high { background: #fecaca; color: #dc2626; }
.badge.critical { background: #fecaca; color: #dc2626; }

.final { background: #f0fdf4; border: 2px solid #08b8a2; color: #065f46; padding: 16px; border-radius: 12px; align-self: center; font-weight: 700; font-size: 15px; margin-top: 12px; text-align: center; }

.loading { align-self: center; padding: 12px; }
.spinner { width: 28px; height: 28px; border: 3px solid #e0e0e0; border-top-color: #08b8a2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <h1>Asinu AI</h1>
  <span class="sub">Auto Check-in Demo — Xem AI test tự động</span>
  <button id="btn-start" onclick="startDemo()">▶ Bắt đầu</button>
</div>

<div class="chat" id="chat"></div>

<script>
const chat = document.getElementById('chat');
const btn = document.getElementById('btn-start');
let running = false;

function addEl(className, html) {
  const div = document.createElement('div');
  div.className = className;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function startDemo() {
  if (running) return;
  running = true;
  btn.disabled = true;
  btn.textContent = '⏳ Đang chạy...';
  chat.innerHTML = '';

  addEl('msg system', '🚀 Đang kết nối đến server...');

  const es = new EventSource('/api/test/auto-checkin');
  let loadingEl = null;

  es.addEventListener('start', (e) => {
    const d = JSON.parse(e.data);
    chat.innerHTML = '';
    addEl('msg system', `👤 <b>${d.profile.full_name}</b> — ${d.profile.medical_conditions.join(', ')}<br>Sẽ test <b>${d.totalScenarios} items</b> (Check-in + Chat AI)`);
  });

  es.addEventListener('section', (e) => {
    const d = JSON.parse(e.data);
    addEl('section-header', d.name + ` (${d.count} tests)`);
  });

  es.addEventListener('scenario', (e) => {
    const d = JSON.parse(e.data);
    addEl('scenario-header', d.name);
  });

  es.addEventListener('user', (e) => {
    const d = JSON.parse(e.data);
    const msgText = d.message === '(greeting)' ? '<i>(greeting — gọi lần đầu)</i>' : d.message;
    addEl('msg user', `<div class="label">${d.label}</div>${msgText}`);
    loadingEl = addEl('loading', '<div class="spinner"></div>');
  });

  es.addEventListener('ai', (e) => {
    if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    const d = JSON.parse(e.data);

    // AI reply
    let html = d.reply || '';

    // Options
    if (d.options && d.options.length > 0) {
      html += '<div class="options">' + d.options.map(o => `<span class="opt">${o}</span>`).join('') + '</div>';
    }

    addEl('msg ai', html);

    // Result card if done
    if (d.isDone && d.severity) {
      const sev = d.severity || 'low';
      let card = `<span class="badge ${sev}">${sev.toUpperCase()}</span>`;
      if (d.summary) card += ` ${d.summary}`;
      if (d.recommendation) card += `<br>💊 ${d.recommendation}`;
      if (d.needsDoctor) card += `<br>🏥 <b>Cần gặp bác sĩ</b>`;
      if (d.hasRedFlag) card += `<br>🚨 <b>RED FLAG</b>`;
      if (d.followUpHours) card += `<br>⏰ Follow-up: ${d.followUpHours}h`;
      addEl('result-card ' + sev, card);
    }

    // Chat AI meta (số câu, ký tự)
    if (d.meta) {
      addEl('msg system', '📏 ' + d.meta);
    }
  });

  es.addEventListener('error', (e) => {
    if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    try {
      const d = JSON.parse(e.data);
      addEl('msg error', '❌ ' + d.step + ': ' + d.error);
    } catch {
      // SSE connection error
    }
  });

  es.addEventListener('scenario_done', (e) => {
    const d = JSON.parse(e.data);
    addEl('scenario-done', '✅ ' + d.name + ' — hoàn tất');
  });

  es.addEventListener('done', (e) => {
    const d = JSON.parse(e.data);
    addEl('final', '🎉 ' + d.message);
    es.close();
    running = false;
    btn.disabled = false;
    btn.textContent = '▶ Chạy lại';
  });

  es.onerror = () => {
    if (loadingEl) { loadingEl.remove(); loadingEl = null; }
    if (!running) return;
    addEl('msg error', '❌ Mất kết nối server');
    es.close();
    running = false;
    btn.disabled = false;
    btn.textContent = '▶ Chạy lại';
  };
}
</script>
</body>
</html>
