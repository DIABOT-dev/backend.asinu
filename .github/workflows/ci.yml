name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Prettier check
        run: npm run format:check
        continue-on-error: true

      - name: Test
        run: npm test -- --testPathPattern=tests/unit
        env:
          NODE_ENV: test
          LOG_LEVEL: error

      - name: Syntax check server entry
        run: node -c server.js
